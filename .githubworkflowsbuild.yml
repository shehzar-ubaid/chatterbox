name: Build and Push Docker Image

on:
  push:
    branches:
      - main # Jab aap main branch par push karenge toh yeh auto chalega

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: GitHub server par space free karega taake storage full na ho
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      # Step 2: Aapka code GitHub se layega
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 3: Docker Build engine setup karega
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step 4: Aapke DockerHub account mein login karega
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 5: Image build kar ke DockerHub par push karega
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/chatterbox-api:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max